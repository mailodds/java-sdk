openapi: 3.0.3
info:
  contact:
    email: support@mailodds.com
    name: MailOdds Support
    url: https://mailodds.com/contact
  description: "MailOdds is an email platform for validation, sending, campaigns,\
    \ deliverability monitoring, and analytics. The API performs multi-layer validation\
    \ checks, delivers transactional and campaign email with DKIM dual signing, and\
    \ tracks engagement with privacy-first analytics.\n\n## Authentication\n\nAll\
    \ API requests require authentication using a Bearer token. Include your API key\
    \ \nin the Authorization header:\n\n```\nAuthorization: Bearer YOUR_API_KEY\n\
    ```\n\nAPI keys can be created in the MailOdds dashboard.\n\n## Rate Limits\n\n\
    Rate limits vary by plan:\n- Free: 10 requests/minute\n- Starter: 60 requests/minute\
    \  \n- Pro: 300 requests/minute\n- Business: 1000 requests/minute\n- Enterprise:\
    \ Custom limits\n\n## Response Format\n\nAll responses include:\n- `schema_version`:\
    \ API schema version (currently \"1.0\")\n- `request_id`: Unique request identifier\
    \ for debugging\n\nError responses include:\n- `error`: Machine-readable error\
    \ code\n- `message`: Human-readable error description\n\n## Webhooks\n\nMailOdds\
    \ can send webhook notifications for job completion and email delivery events.\n\
    Configure webhooks in the dashboard or per-job via the `webhook_url` field.\n\n\
    ### Event Types\n\n| Event | Description |\n|-------|-------------|\n| `job.completed`\
    \ | Validation job finished processing |\n| `job.failed` | Validation job failed\
    \ |\n| `message.queued` | Email queued for delivery |\n| `message.delivered` |\
    \ Email delivered to recipient |\n| `message.bounced` | Email bounced |\n| `message.deferred`\
    \ | Email delivery deferred |\n| `message.failed` | Email delivery failed |\n\
    | `message.opened` | Recipient opened the email |\n| `message.clicked` | Recipient\
    \ clicked a link |\n\n### Payload Format\n\n```json\n{\n  \"event\": \"job.completed\"\
    ,\n  \"job\": { ... },\n  \"timestamp\": \"2026-01-15T10:30:00Z\"\n}\n```\n\n\
    ### Webhook Signing\n\nIf a webhook secret is configured, each request includes\
    \ an `X-MailOdds-Signature` header\ncontaining an HMAC-SHA256 hex digest of the\
    \ request body.\n\n**Verification pseudocode:**\n```\nexpected = HMAC-SHA256(webhook_secret,\
    \ request_body)\nvalid = constant_time_compare(request.headers[\"X-MailOdds-Signature\"\
    ], hex(expected))\n```\n\nThe payload is serialized with compact JSON (no extra\
    \ whitespace, sorted keys) before signing.\n\n### Headers\n\nAll webhook requests\
    \ include:\n- `Content-Type: application/json`\n- `User-Agent: MailOdds-Webhook/1.0`\n\
    - `X-MailOdds-Event: {event_type}`\n- `X-Request-Id: {uuid}`\n- `X-MailOdds-Signature:\
    \ {hmac}` (when secret is configured)\n\n### Retry Policy\n\nFailed deliveries\
    \ (non-2xx response or timeout) are retried up to 3 times with exponential backoff\
    \ (10s, 60s, 300s).\n"
  license:
    name: Proprietary
    url: https://mailodds.com/terms
  termsOfService: https://mailodds.com/terms
  title: MailOdds Email Platform API
  version: 1.0.0
servers:
- description: Production server
  url: https://api.mailodds.com/v1
security:
- BearerAuth: []
tags:
- description: Send transactional emails
  name: Email Sending
- description: Manage sending domain authentication
  name: Sending Domains
- description: Create and send email campaigns with A/B testing
  name: Campaigns
- description: Campaign performance analytics and funnel reporting
  name: Campaign Analytics
- description: Single email validation endpoints
  name: Email Validation
- description: Bulk email validation jobs
  name: Bulk Validation
- description: Manage email/domain suppression lists
  name: Suppression Lists
- description: Custom rules to modify validation results
  name: Validation Policies
- description: Aggregate sender reputation and deliverability scoring
  name: Sender Health
- description: Analyze bounce logs and identify deliverability issues
  name: Bounce Analysis
- description: Manage subscriber lists and subscriptions
  name: Subscriber Lists
- description: Manage contact lists built from validation jobs
  name: Contact Lists
- description: Monitor DMARC compliance and authentication alignment
  name: DMARC Monitoring
- description: Monitor IP and domain blacklist status
  name: Blacklist Monitoring
- description: SMTP handshake and MX configuration audits
  name: Server Tests
- description: Email spam scoring and deliverability checks
  name: Spam Checks
- description: LLM-powered email content analysis
  name: Content Classification
- description: Per-message delivery and engagement event logs
  name: Message Events
- description: Webhook configuration
  name: Webhooks
- description: Health and status endpoints
  name: System
paths:
  /v1/validate:
    post:
      description: "Validate a single email address. Returns detailed validation results\
        \ including status, sub-status, and recommended action."
      operationId: validateEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"
          description: Validation result
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Forbidden - Insufficient permissions or no credits
      summary: Validate single email
      tags:
      - Email Validation
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/validate/batch:
    post:
      description: "Validate up to 100 email addresses synchronously. For larger lists,\
        \ use the bulk jobs API."
      operationId: validateBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/validateBatch_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/validateBatch_200_response"
          description: Batch validation results
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Validate multiple emails (sync)
      tags:
      - Email Validation
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/jobs:
    get:
      description: List all validation jobs for the authenticated account.
      operationId: listJobs
      parameters:
      - description: Pagination cursor (ISO timestamp from previous response)
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 100
          type: integer
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - pending
          - processing
          - completed
          - failed
          - cancelled
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
          description: List of jobs
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: List validation jobs
      tags:
      - Bulk Validation
      x-accepts:
      - application/json
    post:
      description: Create a new bulk validation job by submitting a JSON array of
        emails.
      operationId: createJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
          description: Job created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Create bulk validation job (JSON)
      tags:
      - Bulk Validation
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/jobs/upload:
    post:
      description: "Create a new bulk validation job by uploading a CSV, Excel, or\
        \ TXT file."
      operationId: createJobUpload
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/createJobUpload_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
          description: Job created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Create bulk validation job (file upload)
      tags:
      - Bulk Validation
      x-content-type: multipart/form-data
      x-accepts:
      - application/json
  /v1/jobs/upload/presigned:
    post:
      description: Get a presigned URL for uploading large files (>10MB) directly
        to S3.
      operationId: getPresignedUpload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/getPresignedUpload_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignedUploadResponse"
          description: Presigned upload credentials
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: S3 not configured
      summary: Get S3 presigned upload URL
      tags:
      - Bulk Validation
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/jobs/upload/s3:
    post:
      description: Create a validation job from a file previously uploaded to S3.
      operationId: createJobFromS3
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createJobFromS3_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
          description: Job created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Create job from S3 upload
      tags:
      - Bulk Validation
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/jobs/{job_id}:
    delete:
      description: Permanently delete a completed or cancelled job and its results.
      operationId: deleteJob
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/deleteJob_200_response"
          description: Job deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Resource not found
      summary: Delete a job
      tags:
      - Bulk Validation
      x-accepts:
      - application/json
    get:
      description: Get the status and details of a specific validation job.
      operationId: getJob
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
          description: Job details
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Resource not found
      summary: Get job status
      tags:
      - Bulk Validation
      x-accepts:
      - application/json
  /v1/jobs/{job_id}/results:
    get:
      description: "Download validation results in JSON, CSV, or NDJSON format."
      operationId: getJobResults
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          type: string
        style: simple
      - explode: true
        in: query
        name: format
        required: false
        schema:
          default: json
          enum:
          - json
          - csv
          - ndjson
          type: string
        style: form
      - explode: true
        in: query
        name: filter
        required: false
        schema:
          enum:
          - all
          - valid_only
          - invalid_only
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 1000
          maximum: 10000
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultsResponse"
            text/csv:
              schema:
                type: string
            application/x-ndjson:
              schema:
                type: string
          description: Validation results
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Resource not found
      summary: Get job results
      tags:
      - Bulk Validation
      x-accepts:
      - application/json
      - application/x-ndjson
      - text/csv
  /v1/jobs/{job_id}/cancel:
    post:
      description: Cancel a pending or processing job. Partial results are preserved.
      operationId: cancelJob
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
          description: Job cancelled
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Resource not found
      summary: Cancel a job
      tags:
      - Bulk Validation
      x-accepts:
      - application/json
  /v1/suppression:
    delete:
      description: Remove emails or domains from the suppression list.
      operationId: removeSuppression
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/removeSuppression_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/removeSuppression_200_response"
          description: Entries removed
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Remove suppression entries
      tags:
      - Suppression Lists
      x-content-type: application/json
      x-accepts:
      - application/json
    get:
      description: List all suppression entries for the account.
      operationId: listSuppression
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 50
          type: integer
        style: form
      - explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - email
          - domain
          type: string
        style: form
      - explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: "Filter by entry source (e.g. api, bounce, complaint)"
        explode: true
        in: query
        name: source
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppressionListResponse"
          description: Suppression list
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: List suppression entries
      tags:
      - Suppression Lists
      x-accepts:
      - application/json
    post:
      description: Add emails or domains to the suppression list.
      operationId: addSuppression
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSuppressionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddSuppressionResponse"
          description: Entries added
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Add suppression entries
      tags:
      - Suppression Lists
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/suppression/check:
    post:
      description: Check if an email is suppressed.
      operationId: checkSuppression
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/checkSuppression_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppressionCheckResponse"
          description: Suppression check result
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Check suppression status
      tags:
      - Suppression Lists
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/suppression/stats:
    get:
      description: Get statistics about the suppression list.
      operationId: getSuppressionStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppressionStatsResponse"
          description: Suppression statistics
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Get suppression statistics
      tags:
      - Suppression Lists
      x-accepts:
      - application/json
  /v1/suppression/audit:
    get:
      description: "Get a chronological log of suppression list changes (additions,\
        \ removals)."
      operationId: getSuppressionAuditLog
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppressionAuditResponse"
          description: Audit log entries
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Get suppression audit log
      tags:
      - Suppression Lists
      x-accepts:
      - application/json
  /v1/telemetry/summary:
    get:
      description: Get validation metrics for your account. Useful for building dashboards
        and monitoring. Supports ETag caching.
      operationId: getTelemetrySummary
      parameters:
      - description: Time window for metrics
        explode: true
        in: query
        name: window
        required: false
        schema:
          default: 24h
          enum:
          - 1h
          - 24h
          - 30d
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetrySummary"
          description: Telemetry summary
          headers:
            ETag:
              description: Hash of response for caching
              explode: false
              schema:
                type: string
              style: simple
            Cache-Control:
              description: Caching directive
              explode: false
              schema:
                type: string
              style: simple
        "304":
          description: Not Modified - use cached response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Get validation telemetry
      tags:
      - System
      x-accepts:
      - application/json
  /health:
    get:
      description: Check API health status. No authentication required.
      operationId: healthCheck
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/healthCheck_200_response"
          description: API is healthy
      security: []
      summary: Health check
      tags:
      - System
      x-accepts:
      - application/json
  /v1/policies:
    get:
      description: List all validation policies for your account. Includes plan limits.
      operationId: listPolicies
      parameters:
      - description: Include full rules in response
        explode: true
        in: query
        name: include_rules
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"
          description: List of policies
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: List policies
      tags:
      - Validation Policies
      x-accepts:
      - application/json
    post:
      description: Create a new validation policy with rules.
      operationId: createPolicy
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
          description: Policy created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
        "403":
          description: Plan limit exceeded
      summary: Create policy
      tags:
      - Validation Policies
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/policies/presets:
    get:
      description: Get available preset templates for quick policy creation.
      operationId: getPolicyPresets
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyPresetsResponse"
          description: Available presets
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - Invalid or missing API key
      summary: Get policy presets
      tags:
      - Validation Policies
      x-accepts:
      - application/json
  /v1/policies/from-preset:
    post:
      description: Create a policy using a preset template.
      operationId: createPolicyFromPreset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/createPolicyFromPreset_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponse"
