components:
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Bad request
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Unauthorized - Invalid or missing API key
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Forbidden - Insufficient permissions or no credits
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Resource not found
  schemas:
    ErrorResponse:
      example:
        schema_version: "1.0"
        error: error
        message: message
        request_id: request_id
      properties:
        schema_version:
          example: "1.0"
          type: string
        request_id:
          description: Unique request identifier
          type: string
        error:
          description: Machine-readable error code
          type: string
        message:
          description: Human-readable error message
          type: string
      required:
      - error
      type: object
    ValidateRequest:
      example:
        depth: enhanced
        policy_id: 0
        email: email
      properties:
        email:
          description: Email address to validate
          format: email
          type: string
        depth:
          default: enhanced
          description: Validation depth. 'standard' skips SMTP verification.
          enum:
          - standard
          - enhanced
          type: string
        policy_id:
          description: Optional policy ID to use instead of default policy
          type: integer
      required:
      - email
      type: object
    ValidationResponse:
      description: Flat validation response. Conditional fields are omitted (not null)
        when not applicable.
      example:
        sub_status: format_invalid
        mx_host: mx_host
        role_account: true
        free_provider: true
        retry_after_ms: 0
        has_spf: true
        dmarc_policy: none
        catch_all: true
        suppression_match:
          reason: reason
          match_type: email
          match_value: match_value
        disposable: true
        policy_applied:
          rule_id: 1
          rule_type: rule_type
          policy_id: 6
          policy_name: policy_name
        schema_version: "1.0"
        depth: standard
        domain: domain
        mx_found: true
        has_dmarc: true
        dnsbl_listed: true
        action: accept
        processed_at: 2000-01-23T04:56:07.000+00:00
        smtp_check: true
        request_id: request_id
        email: email
        suggested_email: suggested_email
        status: valid
      properties:
        schema_version:
          example: "1.0"
          type: string
        request_id:
          description: Unique request identifier
          type: string
        email:
          type: string
        status:
          description: Validation status
          enum:
          - valid
          - invalid
          - catch_all
          - do_not_mail
          - unknown
          type: string
        action:
          description: Recommended action
          enum:
          - accept
          - accept_with_caution
          - reject
          - retry_later
          type: string
        sub_status:
          description: Detailed status reason. Omitted when none.
          enum:
          - format_invalid
          - mx_missing
          - mx_timeout
          - smtp_unreachable
          - smtp_rejected
          - disposable
          - role_account
          - greylisted
          - catch_all_detected
          - domain_not_found
          - suppression_match
          - restricted_military
          - restricted_sanctioned
          type: string
        domain:
          type: string
        mx_found:
          description: Whether MX records were found for the domain
          type: boolean
        mx_host:
          description: Primary MX hostname. Omitted when MX not resolved.
          type: string
        smtp_check:
          description: Whether SMTP verification passed. Omitted when SMTP not checked.
          type: boolean
        catch_all:
          description: Whether domain is catch-all. Omitted when SMTP not checked.
          type: boolean
        disposable:
          description: Whether domain is a known disposable email provider
          type: boolean
        role_account:
          description: "Whether address is a role account (e.g., info@, admin@)"
          type: boolean
        free_provider:
          description: "Whether domain is a known free email provider (e.g., gmail.com)"
          type: boolean
        depth:
          description: Validation depth used for this check
          enum:
          - standard
          - enhanced
          type: string
        processed_at:
          description: ISO 8601 timestamp of validation
          format: date-time
          type: string
        suggested_email:
          description: Domain typo correction suggestion based on a static lookup
            table of common misspellings (e.g. gmial.com -> gmail.com). Not validated
            via SMTP. Omitted when no match found.
          type: string
        retry_after_ms:
          description: Suggested retry delay in milliseconds. Present only for retry_later
            action.
          type: integer
        has_spf:
          description: Whether the domain has an SPF record. Omitted for standard
            depth.
          type: boolean
        has_dmarc:
          description: Whether the domain has a DMARC record. Omitted for standard
            depth.
          type: boolean
        dmarc_policy:
          description: The domain's DMARC policy. Omitted when no DMARC record found.
          enum:
          - none
          - quarantine
          - reject
          type: string
        dnsbl_listed:
          description: Whether the domain's MX IP is on a DNS blocklist (Spamhaus
            ZEN). Omitted for standard depth.
          type: boolean
        suppression_match:
          $ref: "#/components/schemas/ValidationResponse_suppression_match"
        policy_applied:
          $ref: "#/components/schemas/ValidationResponse_policy_applied"
      required:
      - action
      - depth
      - disposable
      - domain
      - email
      - free_provider
      - mx_found
      - processed_at
      - role_account
      - schema_version
      - status
      type: object
    CreateJobRequest:
      description: "Bulk jobs use the account's default validation policy. To use\
        \ a specific policy, set it as default via the Policies API."
      example:
        emails:
        - emails
        - emails
        - emails
        - emails
        - emails
        metadata: "{}"
        webhook_url: https://openapi-generator.tech
        idempotency_key: idempotency_key
        dedup: false
      properties:
        emails:
          description: List of emails to validate
          items:
            format: email
            type: string
          maxItems: 100000
          type: array
        dedup:
          default: false
          description: Remove duplicate emails
          type: boolean
        metadata:
          description: Custom metadata for the job
          type: object
        webhook_url:
          description: URL for completion webhook. Payloads are signed with HMAC-SHA256
            if a webhook secret is configured (see Webhooks section).
          format: uri
          type: string
        idempotency_key:
          description: Unique key for idempotent requests
          type: string
      required:
      - emails
      type: object
    JobResponse:
      example:
        schema_version: "1.0"
        job:
          summary:
            valid: 1
            do_not_mail: 2
            invalid: 5
            catch_all: 5
            unknown: 7
          error_message: error_message
          results_expire_at: 2000-01-23T04:56:07.000+00:00
          metadata: "{}"
          total_count: 0
          created_at: 2000-01-23T04:56:07.000+00:00
          completed_at: 2000-01-23T04:56:07.000+00:00
          name: name
          started_at: 2000-01-23T04:56:07.000+00:00
          processed_count: 6
          id: job_abc123xyz
          request_id: request_id
